<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Gate Pass Management</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .notifications-header {
            background: white; border-radius: 15px; padding: 30px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;
        }
        .notifications-header h2 { margin: 0; color: #333; }
        .notification-actions { display: flex; gap: 10px; }
        .filters-section {
            background: white; border-radius: 15px; padding: 20px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        .filters-section select { padding: 8px 12px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 14px; }
        .filters-section select:focus { outline: none; border-color: #4facfe; }
        .notifications-list { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .notification-item {
            background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 15px;
            border-left: 4px solid #4facfe; transition: all 0.3s ease; position: relative;
        }
        .notification-item:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .notification-item.unread { background: #e3f2fd; border-left-color: #2196f3; }
        .notification-item.approved { border-left-color: #00b894; }
        .notification-item.rejected { border-left-color: #ff4757; }
        .notification-item.pending { border-left-color: #fdcb6e; }
        .notification-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .notification-title { font-weight: 600; color: #333; font-size: 16px; margin-bottom: 5px; }
        .notification-time { color: #666; font-size: 12px; }
        .notification-message { color: #555; line-height: 1.5; margin-bottom: 15px; }
        .notification-actions { display: flex; gap: 10px; align-items: center; }
        .mark-read-btn {
            background: #4facfe; color: white; border: none; padding: 6px 12px;
            border-radius: 6px; font-size: 12px; cursor: pointer; transition: background 0.3s ease;
        }
        .mark-read-btn:hover { background: #3d8bfd; }
        .delete-btn {
            background: #ff4757; color: white; border: none; padding: 6px 12px;
            border-radius: 6px; font-size: 12px; cursor: pointer; transition: background 0.3s ease;
        }
        .delete-btn:hover { background: #ff3838; }
        .notification-icon { font-size: 24px; margin-right: 10px; }
        .no-notifications { text-align: center; color: #999; padding: 60px 20px; font-style: italic; }
        .stats-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .stat-number { font-size: 36px; font-weight: bold; color: #4facfe; margin-bottom: 10px; }
        .stat-label { color: #666; font-size: 14px; }
        .unread-indicator {
            position: absolute; top: 20px; right: 20px; width: 10px; height: 10px;
            background: #2196f3; border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .priority-high { border-left-color: #ff4757 !important; }
        .priority-medium { border-left-color: #fdcb6e !important; }
        .priority-low { border-left-color: #00b894 !important; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="navbar">
            <h2>Notifications</h2>
            <div>
                <!-- No onclick — attached in notifications.js -->
                <button id="goBackBtn" class="btn btn-secondary">← Back</button>
                <button id="logoutBtn" class="btn btn-danger" style="margin-left: 10px;">Logout</button>
            </div>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-number" id="totalNotifications">0</div>
                <div class="stat-label">Total Notifications</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="unreadNotifications">0</div>
                <div class="stat-label">Unread Messages</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingRequests">0</div>
                <div class="stat-label">Pending Requests</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approvedToday">0</div>
                <div class="stat-label">Approved Today</div>
            </div>
        </div>

        <div class="notifications-header">
            <div>
                <h2>My Notifications</h2>
                <p>Stay updated with your gate pass requests and system alerts</p>
            </div>
            <div class="notification-actions">
                <button id="markAllReadBtn" class="btn btn-primary">Mark All as Read</button>
                <button id="clearAllBtn" class="btn btn-danger">Clear All</button>
            </div>
        </div>

        <div class="filters-section">
            <label for="typeFilter">Filter by Type:</label>
            <select id="typeFilter">
                <option value="all">All Types</option>
                <option value="request">Request Updates</option>
                <option value="approval">Approval Notifications</option>
                <option value="security">Security Alerts</option>
                <option value="system">System Messages</option>
            </select>
            <label for="statusFilter">Filter by Status:</label>
            <select id="statusFilter">
                <option value="all">All Status</option>
                <option value="unread">Unread Only</option>
                <option value="read">Read Only</option>
            </select>
            <label for="priorityFilter">Filter by Priority:</label>
            <select id="priorityFilter">
                <option value="all">All Priorities</option>
                <option value="high">High Priority</option>
                <option value="medium">Medium Priority</option>
                <option value="low">Low Priority</option>
            </select>
            <button id="resetFiltersBtn" class="btn btn-secondary">Reset Filters</button>
        </div>

        <div class="notifications-list">
            <h3>Recent Notifications</h3>
            <div id="notificationsList"></div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="notifications.js"></script>
</body>
</html>
