<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Activity Logs - Gate Pass Management</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .stats-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }
        .stat-card {
            background: white; border-radius: 15px; padding: 25px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .stat-card h4 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card p { font-size: 36px; font-weight: bold; color: #4facfe; margin: 0; }
        .filter-section {
            background: white; border-radius: 15px; padding: 20px;
            margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .filter-controls { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .filter-select, .filter-input {
            padding: 10px 15px; border: 2px solid #e1e5e9;
            border-radius: 8px; font-size: 14px;
        }
        .filter-select:focus, .filter-input:focus { outline: none; border-color: #4facfe; }
        .table-container {
            background: white; border-radius: 15px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow-x: auto;
        }
        .requests-table { width: 100%; border-collapse: collapse; }
        .requests-table th, .requests-table td {
            padding: 12px; text-align: left; border-bottom: 1px solid #eee;
        }
        .requests-table th { background: #f8f9fa; font-weight: 600; color: #333; }
        .pagination {
            display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap;
        }
        .pagination-btn {
            padding: 8px 14px; border: 1px solid #ddd; background: white;
            border-radius: 6px; cursor: pointer; transition: all 0.2s;
        }
        .pagination-btn:hover { background: #f8f9fa; }
        .pagination-btn.active { background: #4facfe; color: white; border-color: #4facfe; }
        .pagination-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .dashboard-header {
            background: white; border-radius: 15px; padding: 25px;
            margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .dashboard-header h3 { margin: 0 0 5px 0; color: #333; }
        .dashboard-header p { margin: 0; color: #666; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="navbar">
            <h2>Student Activity Logs</h2>
            <div>
                <!-- No onclick — attached in student-logs.js -->
                <button id="backBtn" class="btn btn-secondary">← Back to Dashboard</button>
                <button id="exportBtn" class="btn btn-primary" style="margin-left: 10px;">📊 Export Logs</button>
            </div>
        </div>

        <div class="dashboard-header">
            <h3>📋 Student Activity Monitoring</h3>
            <p>View and monitor all student activities in the system</p>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <h4>Total Activities</h4>
                <p id="totalActivities">0</p>
            </div>
            <div class="stat-card">
                <h4>Today's Activities</h4>
                <p id="todayActivities">0</p>
            </div>
            <div class="stat-card">
                <h4>Active Students</h4>
                <p id="activeStudents">0</p>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-controls">
                <select id="activityFilter" class="filter-select">
                    <option value="">All Activities</option>
                    <option value="Login">Login</option>
                    <option value="Logout">Logout</option>
                    <option value="Gate Pass Request">Gate Pass Request</option>
                </select>
                <input type="date" id="dateFilter" class="filter-input">
                <input type="text" id="studentFilter" placeholder="Search by student name..." class="filter-input">
                <!-- No onclick — attached in student-logs.js -->
                <button id="filterBtn" class="btn btn-primary">🔍 Filter</button>
                <button id="clearBtn" class="btn btn-secondary">Clear</button>
            </div>
        </div>

        <div class="table-container">
            <table class="requests-table">
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Username</th>
                        <th>Activity</th>
                        <th>Date & Time</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody"></tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="student-logs.js"></script>
</body>
</html>
