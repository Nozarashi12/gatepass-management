<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry/Exit History - Gate Pass Management</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .filter-section {
            background: white; border-radius: 15px; padding: 25px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
        }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 14px; color: #666; font-weight: 500; }
        .filter-group input, .filter-group select {
            padding: 10px 15px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 14px; min-width: 150px;
        }
        .filter-group input:focus, .filter-group select:focus { outline: none; border-color: #4facfe; }
        .history-table { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #333; position: sticky; top: 0; }
        .entry-badge { background: #d4edda; color: #155724; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .exit-badge { background: #fff3cd; color: #856404; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .denied-badge { background: #f8d7da; color: #721c24; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .stats-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .stat-number { font-size: 36px; font-weight: bold; color: #4facfe; margin-bottom: 10px; }
        .stat-label { color: #666; font-size: 14px; }
        .export-section {
            background: white; border-radius: 15px; padding: 20px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;
        }
        .no-data { text-align: center; color: #999; padding: 40px; font-style: italic; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .pagination button { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; transition: all 0.3s ease; }
        .pagination button:hover { background: #f8f9fa; }
        .pagination button.active { background: #4facfe; color: white; border-color: #4facfe; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="navbar">
            <h2>Entry/Exit History</h2>
            <div>
                <!-- No onclick — attached in entry-exit-history.js -->
                <button id="goBackBtn" class="btn btn-secondary">← Back</button>
                <button id="logoutBtn" class="btn btn-danger" style="margin-left: 10px;">Logout</button>
            </div>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-number" id="totalEntries">0</div>
                <div class="stat-label">Total Entries Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalExits">0</div>
                <div class="stat-label">Total Exits Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalDenied">0</div>
                <div class="stat-label">Access Denied Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalRecords">0</div>
                <div class="stat-label">Total Records</div>
            </div>
        </div>

        <div class="export-section">
            <div>
                <h3>History Records</h3>
                <p>View and filter entry/exit records</p>
            </div>
            <div>
                <button id="exportBtn" class="btn btn-primary">📥 Export to CSV</button>
                <button id="printBtn" class="btn btn-secondary" style="margin-left: 10px;">🖨️ Print</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label for="dateFilter">Date</label>
                <input type="date" id="dateFilter">
            </div>
            <div class="filter-group">
                <label for="typeFilter">Type</label>
                <select id="typeFilter">
                    <option value="all">All Types</option>
                    <option value="entry">Entry Only</option>
                    <option value="exit">Exit Only</option>
                    <option value="denied">Denied Only</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="userFilter">Username</label>
                <input type="text" id="userFilter" placeholder="Enter username...">
            </div>
            <div class="filter-group">
                <label for="biometricFilter">Verification</label>
                <select id="biometricFilter">
                    <option value="all">All Methods</option>
                    <option value="fingerprint">Fingerprint</option>
                    <option value="face">Face</option>
                    <option value="both">Both</option>
                    <option value="none">None</option>
                </select>
            </div>
            <div class="filter-group">
                <label>&nbsp;</label>
                <button id="resetFiltersBtn" class="btn btn-primary">Reset Filters</button>
            </div>
        </div>

        <div class="history-table">
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Date & Time</th><th>Student Name</th><th>Username</th><th>Type</th>
                        <th>Gate Pass ID</th><th>Verification Method</th><th>Verified By</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody"></tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="entry-exit-history.js"></script>
</body>
</html>
